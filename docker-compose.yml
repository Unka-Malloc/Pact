services:
  pact-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: pact-server:local
    container_name: pact-server
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PACT_SERVER_HOST: 0.0.0.0
      PACT_SERVER_PORT: 8787
      PACT_SERVER_DATA_DIR: /data
      PACT_SERVER_WITH_UI: "1"
      PACT_BOOTSTRAP_URL: http://127.0.0.1:8787
      PACT_ADVERTISED_BASE_URL: http://127.0.0.1:8787
      PACT_ACTIVE_SERVICE_URL: http://127.0.0.1:8787
      CODEX_HOME: /codex-home
    volumes:
      - ./.pact-server-data:/data
      - ${HOME}/.codex:/codex-home

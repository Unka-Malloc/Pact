name: CI

on:
  push:
    branches: ["main", "develop", "release/**"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "develop", "release/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Hygiene ────────────────────────────────────────────────────────────────
  hygiene:
    name: Hygiene checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Repository hygiene
        run: npm run repo:hygiene
      - name: Security hygiene
        run: npm run security:hygiene

  # ── TypeScript type check ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit

  # ── Frontend build ─────────────────────────────────────────────────────────
  build-renderer:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build renderer
        run: npm run build:renderer:raw
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist
          path: build/dist/
          retention-days: 7

  # ── Fast test suite ────────────────────────────────────────────────────────
  test-fast:
    name: Fast tests
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client-cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: npm ci
      - name: Install Flutter dependencies
        run: npm run client:get
      - name: Run fast tests
        run: npm run test:fast
      - name: Upload fast test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-fast
          path: build/test-reports/
          if-no-files-found: ignore
          retention-days: 14

  # ── Security gate ──────────────────────────────────────────────────────────
  test-security:
    name: Security tests
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client-cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install dependencies
        run: npm ci
      - name: Run security tests
        run: npm run test:security
      - name: Upload security test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-security
          path: build/test-reports/
          if-no-files-found: ignore
          retention-days: 14

  # ── Smoke suite ────────────────────────────────────────────────────────────
  test-smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [build-renderer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client-cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install dependencies
        run: npm ci
      - name: Download renderer dist
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: build/dist/
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-smoke
          path: build/test-reports/
          if-no-files-found: ignore
          retention-days: 14

  # ── Regression / smoke suite ───────────────────────────────────────────────
  test-regression:
    name: Regression tests
    runs-on: ubuntu-latest
    needs: [build-renderer, test-fast, test-security, test-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client-cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: npm ci
      - name: Install Flutter dependencies
        run: npm run client:get
      - name: Download renderer dist
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: build/dist/
      - name: Run regression tests
        run: npm run test:regression
      - name: Upload regression test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-regression
          path: build/test-reports/
          if-no-files-found: ignore
          retention-days: 14

  # ── Docker build verification ──────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [hygiene, typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pact-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release readiness gate ─────────────────────────────────────────────────
  release-readiness:
    name: Release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [ci-required]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('client-cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config \
            xvfb
      - name: Install dependencies
        run: npm ci
      - name: Install Flutter dependencies
        run: npm run client:get
      - name: Run full release tests
        run: npm run test:full
      - name: Verify v0.0.1 readiness
        run: npm run server:verify:v001
      - name: Verify production readiness
        run: npm run server:verify:production-readiness
      - name: Upload release readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-artifacts
          path: |
            build/test-reports/
            build/artifacts/
            reports/v001-readiness/
            reports/production-readiness/
          if-no-files-found: ignore
          retention-days: 30

  # ── Branch protection aggregate ────────────────────────────────────────────
  ci-required:
    name: Required CI gate
    runs-on: ubuntu-latest
    needs:
      - hygiene
      - typecheck
      - build-renderer
      - test-fast
      - test-security
      - test-smoke
      - test-regression
      - docker-build
    if: always()
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          cat <<'JSON'
          ${{ toJson(needs) }}
          JSON
          exit 1
      - name: Required CI passed
        run: echo "All required CI gates passed."
